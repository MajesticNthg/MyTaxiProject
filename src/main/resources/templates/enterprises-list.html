<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список предприятий</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        h1 {
            color: #333
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
            font-weight: normal;
        }

        .buttons-group {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .add-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            color: black;
            cursor: pointer;
        }

        .back-link {
            display: inline-block;
            padding: 10px 15px;
            color: black;
            cursor: pointer;
        }

        .delete-button {
            color: red;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Список предприятий</h1>

    <div class="buttons-group">
        <a href="/enterprises/new" class="add-button">+ Добавить предприятие</a>
        <a href="/cars" class="back-link">К списку автомобилей</a>
        <a href="/drivers" class="back-link">К списку водителей</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Название</th>
            <th>Город</th>
            <th>Количество сотрудников</th>
            <th>Машины предриятия</th>
            <th>Водители предприятия</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="enterprise : ${enterprises}">
            <td th:text="${enterprise.id}">1</td>
            <td th:text="${enterprise.name}">Такси-Москва</td>
            <td th:text="${enterprise.city}">Москва</td>
            <td th:text="${enterprise.employeeCount}">150</td>
            <td th:text="${enterprise.cars != null && !enterprise.cars.isEmpty() ?
                        #strings.listJoin(enterprise.cars.![id], ', ') : '—'}">—</td>
            <td th:text="${enterprise.drivers != null && !enterprise.drivers.isEmpty() ?
                        #strings.listJoin(enterprise.drivers.![id], ', ') : '—'}">—</td>
            <td>
                <a th:href="@{/enterprises/edit/{id}(id=${enterprise.id})}" class="edit-button">Изменить</a>
                <a th:href="@{/enterprises/delete/{id}(id=${enterprise.id})}"
                   class="delete-button"
                   th:onclick="'return confirm(\'Удалить предприятие c ID ' + ${enterprise.id} + '?\')'">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${enterprises.isEmpty()}" style="margin-top: 20px; color: #999;">
        Пока нет добавленных предприятий.
    </div>
</div>
</body>
</html>
