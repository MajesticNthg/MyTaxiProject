<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Добавление предприятия</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 50px auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        h1 {
            color: #333
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: inline-block;
            width: 180px;
            font-weight: normal;
        }

        input {
            padding: 6px;
            width: 250px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #999;
        }

        .buttons-group {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #555;
        }

        .cancel {
            display: inline-block;
            padding: 8px 16px;
            background-color: #ccc;
            color: black;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>+ Добавление предприятия</h1>

    <form action="#" th:action="@{/enterprises/save}" th:object="${enterprise}" method="post">

        <div class="form-group">
            <label>Название:</label>
            <input type="text" th:field="*{name}" required>
        </div>

        <div class="form-group">
            <label>Город:</label>
            <input type="text" th:field="*{city}" required>
        </div>

        <div class="form-group">
            <label>Количество сотрудников:</label>
            <input type="text" th:field="*{employeeCount}" required>
        </div>

        <div class="buttons-group">
            <button type="submit">Сохранить</button>
            <a href="/enterprises" class="cancel">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
