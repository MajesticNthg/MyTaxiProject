<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список водителей</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        h1 {
            color: #333
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
            text-align: left;
        }

        th {
            background-color: #f0f0f0;
            font-weight: normal;
        }

        .buttons-group {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        .add-button {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            color: black;
            cursor: pointer;
        }

        .delete-button {
            color: red;
            text-decoration: none;
            margin-left: 10px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Список водителей</h1>

    <div class="buttons-group">
        <a href="/drivers/new" class="add-button">+ Добавить водителя</a>
        <a href="/cars" class="add-button">К списку автомобилей</a>
    </div>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Возраст</th>
            <th>Зарплата (₽)</th>
            <th>Предприятие</th>
            <th>Действия</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="driver : ${drivers}">
            <td th:text="${driver.id}">1</td>
            <td th:text="${driver.name}">Иван Петров</td>
            <td th:text="${driver.age}">35</td>
            <td th:text="${driver.salary}">80000</td>
            <td th:text="${driver.enterprise != null ? driver.enterprise.name : '—'}">Такси-Москва</td>
            <td>
                <a th:href="@{/drivers/edit/{id}(id=${driver.id})}" class="edit-button">Изменить</a>
                <a th:href="@{/drivers/delete/{id}(id=${driver.id})}"
                   class="delete-button"
                   th:onclick="'return confirm(\'Удалить водителя с ID ' + ${driver.id} + '?\')'">Удалить</a>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${drivers.isEmpty()}" style="margin-top: 20px; color: #999;">
        Пока нет добавленных водителей.
    </div>
</div>
</body>
</html>
