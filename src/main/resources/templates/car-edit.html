<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Редактирование автомобиля</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: white;
            padding: 20px;
            border: 1px solid #ddd;
        }

        h1 {
            color: #333;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-weight: normal;
        }

        input, select {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            font-size: 14px;
            box-sizing: border-box;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #999;
        }

        .readonly-field {
            background-color: #f9f9f9;
            padding: 8px;
            border: 1px solid #ddd;
            color: #666;
        }

        .buttons {
            margin-top: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background-color: #333;
            color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
        }

        button:hover {
            background-color: #555;
        }

        .cancel {
            display: inline-block;
            padding: 8px 16px;
            background-color: #ccc;
            color: black;
            text-decoration: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Редактирование автомобиля</h1>

    <form action="#" th:action="@{/cars/update/{id}(id=${car.id})}"
          th:object="${car}"
          method="post">

        <div class="form-group">
            <label>ID</label>
            <div class="readonly-field" th:text="${car.id}">1</div>
        </div>

        <div class="form-group">
            <label>Гос. номер</label>
            <input type="text" th:field="*{licensePlate}" required>
        </div>

        <div class="form-group">
            <label>Год выпуска</label>
            <input type="text" th:field="*{yearOfRelease}" required>
        </div>

        <div class="form-group">
            <label>Пробег (км)</label>
            <input type="text" th:field="*{carMileage}" required>
        </div>

        <div class="form-group">
            <label>Стоимость (Р)</label>
            <input type="text" th:field="*{price}" required>
        </div>

        <div class="form-group">
            <label>Бренд</label>
            <select name="brandId" required>
                <option th:each="brand : ${brands}"
                        th:value="${brand.id}"
                        th:text="${brand.brandName}"
                        th:selected="${brand.id == car.brand.id}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Предприятие:</label>
            <select name="enterpriseId">
                <option value="">— Без предприятия —</option>
                <option th:each="enterprise : ${enterprises}"
                        th:value="${enterprise.id}"
                        th:text="${enterprise.name}"
                        th:selected="${enterprise.id == car.enterprise.id}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Водители:</label>
            <select name="driverIds" multiple size="5">
                <option th:each="driver : ${allDrivers}"
                        th:value="${driver.id}"
                        th:text="${driver.name}"
                        th:selected="${car.drivers.contains(driver)}">
                </option>
            </select>
        </div>

        <div class="form-group">
            <label>Активный водитель:</label>
            <select name="activeDriverId">
                <option value="">Не выбран</option>
                <option th:each="driver : ${allDrivers}"
                        th:value="${driver.id}"
                        th:text="${driver.name}"
                        th:selected="${car.activeDriver != null and car.activeDriver.id == driver.id}">
                </option>
            </select>
        </div>

        <div class="buttons">
            <button type="submit">Сохранить изменения</button>
            <a href="/cars" class="cancel">Отмена</a>
        </div>
    </form>
</div>
</body>
</html>
